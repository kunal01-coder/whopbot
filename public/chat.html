<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Support</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Instrument+Sans:wght@400;500;600&display=swap');
:root{--bg:#09090e;--surface:#111117;--surface2:#17171f;--border:#252533;--accent:#6c4ef2;--accent2:#f0516a;--glow:rgba(108,78,242,.25);--text:#eeeef8;--muted:#7a7a8e;--success:#3de87a;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 10% 0%,rgba(108,78,242,.12) 0%,transparent 60%);pointer-events:none;}

/* TOPBAR */
.topbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);flex-shrink:0;position:relative;z-index:1;}
.bot-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;box-shadow:0 0 14px var(--glow);}
.bot-name{font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;}
.bot-status{font-size:.72rem;color:var(--success);display:flex;align-items:center;gap:5px;margin-top:2px;}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);box-shadow:0 0 6px var(--success);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.powered{margin-left:auto;font-size:.68rem;color:var(--muted);font-style:italic;}
.powered span{color:var(--accent);}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth;position:relative;z-index:1;}
.msg{display:flex;gap:9px;max-width:86%;animation:msgIn .28s ease;}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;}
.msg-av.bot{background:linear-gradient(135deg,var(--accent),#4a32c8);}
.msg-av.usr{background:linear-gradient(135deg,#f0516a,#f7971e);}
.bubble{padding:10px 14px;border-radius:14px;font-size:.86rem;line-height:1.56;}
.msg.bot .bubble{background:var(--surface);border:1px solid var(--border);border-top-left-radius:4px;}
.msg.user .bubble{background:var(--accent);color:#fff;border-top-right-radius:4px;}
.msg-time{font-size:.63rem;color:var(--muted);margin-top:4px;}
.msg.user .msg-time{text-align:right;}

/* TYPING */
.typing-ind{display:flex;gap:4px;padding:10px 14px;}
.t-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce 1.1s infinite;}
.t-dot:nth-child(2){animation-delay:.18s;}
.t-dot:nth-child(3){animation-delay:.36s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-7px);opacity:1}}

/* INPUT */
.input-row{padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;background:var(--surface);flex-shrink:0;position:relative;z-index:1;}
.inp{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:.86rem;padding:10px 14px;outline:none;resize:none;min-height:42px;max-height:100px;transition:border-color .2s,box-shadow .2s;}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,78,242,.2);}
.send{width:42px;height:42px;border-radius:11px;border:none;background:var(--accent);color:#fff;font-size:1rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px var(--glow);}
.send:hover{background:#7d64f5;transform:scale(1.06);}
.send:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* LOADING / ERROR states */
.center-state{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted);font-size:.88rem;text-align:center;padding:24px;}
.center-state .icon{font-size:2.5rem;opacity:.4;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="bot-avatar">🤖</div>
  <div>
    <div class="bot-name" id="bot-title">Community Support</div>
    <div class="bot-status"><div class="status-dot"></div>Online — replies instantly</div>
  </div>
  <div class="powered">Powered by <span>WhopBot</span></div>
</div>

<div class="messages" id="messages">
  <div class="center-state" id="loading-state">
    <div class="icon">⏳</div>
    <div>Loading your support bot...</div>
  </div>
</div>

<div class="input-row">
  <textarea class="inp" id="inp" placeholder="Ask anything..." rows="1" onkeydown="onKey(event)" oninput="autoH(this)" disabled></textarea>
  <button class="send" id="send-btn" onclick="send()" disabled>➤</button>
</div>

<script>
const params = new URLSearchParams(location.search);
const uid    = params.get('uid');
let history  = [];
let busy     = false;
let communityName = 'our community';

function now() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function autoH(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function onKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } }

function appendMsg(text, role) {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = `msg ${role}`;
  d.innerHTML = role === 'user'
    ? `<div class="msg-av usr">👤</div><div><div class="bubble">${esc(text)}</div><div class="msg-time">${now()}</div></div>`
    : `<div class="msg-av bot">🤖</div><div><div class="bubble">${text}</div><div class="msg-time">${now()}</div></div>`;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const d = document.createElement('div');
  d.id = 'typing'; d.className = 'msg bot';
  d.innerHTML = `<div class="msg-av bot">🤖</div><div class="bubble typing-ind"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function hideTyping(){ const el=document.getElementById('typing'); if(el) el.remove(); }

function enable() {
  document.getElementById('inp').disabled = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('inp').focus();
}

function showError(msg) {
  document.getElementById('messages').innerHTML = `
    <div class="center-state">
      <div class="icon">⚠️</div>
      <div>${msg}</div>
    </div>`;
}

async function init() {
  if (!uid) { showError('Invalid link. Please contact support.'); return; }
  try {
    const res  = await fetch(`/api/widget?userId=${uid}`);
    const data = await res.json();
    if (!res.ok) { showError('Bot not found. Please check the link.'); return; }

    communityName = data.communityName || 'our community';
    document.getElementById('bot-title').textContent = communityName + ' Support';
    document.title = communityName + ' Support';

    // Clear loader, show welcome
    document.getElementById('messages').innerHTML = '';
    appendMsg(`Hey! 👋 Welcome to <strong>${esc(communityName)}</strong>. I'm your AI support assistant — ask me anything!`, 'bot');
    enable();
  } catch(e) {
    showError('Could not connect. Please try refreshing.');
  }
}

async function send() {
  const inp  = document.getElementById('inp');
  const text = inp.value.trim();
  if (!text || busy) return;
  inp.value = ''; inp.style.height = 'auto';
  appendMsg(text, 'user');
  history.push({ role:'user', content:text });
  busy = true;
  document.getElementById('send-btn').disabled = true;
  showTyping();

  try {
    const res  = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history, userId: uid })
    });
    const data = await res.json();
    hideTyping();
    const reply = data.reply || "I couldn't respond — please try again!";
    history.push({ role:'assistant', content:reply });
    appendMsg(reply, 'bot');
  } catch(e) {
    hideTyping();
    appendMsg("⚠️ Connection issue. Please try again.", 'bot');
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('inp').focus();
}

init();
</script>
</body>
</html>
